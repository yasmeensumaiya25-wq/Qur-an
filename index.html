<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayah | Emerald Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --sidebar-bg: #0a0f1a;
            --card-bg: #0f172a;
            --gold: #fbbf24; 
            --emerald: #10b981;   
            --text: #f8fafc;
            --sub-text: #94a3b8;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Quicksand', sans-serif; margin: 0; 
            display: flex; /* Sidebar layout */
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(16, 185, 129, 0.2);
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            z-index: 100;
        }

        .sidebar-logo {
            color: var(--gold);
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.4));
        }

        .sidebar-brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .sidebar-info {
            padding: 20px;
            font-size: 0.85rem;
            color: var(--sub-text);
            line-height: 1.6;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 20px;
        }

        /* --- MAIN CONTENT --- */
        .main-wrapper {
            margin-left: 240px; /* Space for sidebar */
            flex: 1;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 2px 2px, rgba(16, 185, 129, 0.05) 1px, transparent 0);
            background-size: 30px 30px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center; padding: 40px 20px; background: rgba(15, 23, 42, 0.6);
            border-radius: 30px; border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 30px; backdrop-filter: blur(12px);
        }

        .gold-text { color: var(--gold); }

        .nav-bar { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        input {
            background: var(--card-bg); border: 1px solid rgba(16, 185, 129, 0.3);
            color: #fff; padding: 12px; border-radius: 12px; width: 60px; text-align: center;
        }

        .btn-action {
            background: var(--emerald); color: #05070a; border: none;
            padding: 12px 20px; border-radius: 12px; cursor: pointer;
            font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-gold { background: var(--gold); }
        .btn-outline { background: transparent; border: 1px solid var(--emerald); color: var(--emerald); }
        .btn-action:hover { transform: translateY(-2px); }

        /* --- CARDS --- */
        .ayah-card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        .arabic {
            font-family: 'Amiri', serif; font-size: 2rem; text-align: right;
            color: #fff; line-height: 2.2; margin-bottom: 15px; direction: rtl;
        }

        .translation { font-size: 1rem; color: var(--sub-text); line-height: 1.5; margin-bottom: 20px; }

        .tafseer-panel {
            background: rgba(16, 185, 129, 0.08); border-radius: 12px; padding: 15px;
            font-size: 0.9rem; color: #d1fae5; border-left: 3px solid var(--emerald);
            display: none; margin-top: 15px;
        }

        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .ayah-info { font-size: 0.7rem; color: var(--gold); font-weight: 700; }
        .audio-mini { background: none; border: none; color: var(--emerald); cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-wrapper { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo"><i data-lucide="book-marked" size="48"></i></div>
    <div class="sidebar-brand">Ayah</div>
    
    <div class="sidebar-info">
        <strong style="color: var(--emerald);">The Divine Shield</strong><br>
        The Qur'an is a healing for the hearts and a light for the soul.
    </div>
    
    <div class="sidebar-info" style="border:none; font-style: italic;">
        "This is the Book about which there is no doubt, a guidance for those conscious of Allah."
    </div>
</div>

<div class="main-wrapper">
    <div class="container">
        <header>
            <div style="margin-bottom: 10px;"><i data-lucide="sparkles" color="#fbbf24" size="32"></i></div>
            <h1>The Radiant <span class="gold-text">Quran</span></h1>
            <p id="statusMsg">Explore the Divine Wisdom</p>
        </header>

        <div class="nav-bar">
            <input type="number" id="surahNum" value="1" min="1" max="114">
            <button class="btn-action" onclick="loadSurah()"><i data-lucide="book-open"></i> Read</button>
            <button class="btn-action btn-gold" onclick="saveBookmark()"><i data-lucide="bookmark"></i></button>
            <button class="btn-action btn-outline" onclick="loadRandom()"><i data-lucide="zap"></i> Inspire Me</button>
        </div>

        <div id="mainContent"></div>
    </div>
</div>

<script>
    lucide.createIcons();

    window.onload = () => {
        const last = localStorage.getItem('quran_bookmark');
        if(last) {
            document.getElementById('surahNum').value = last;
            loadSurah();
        }
    };

    function saveBookmark() {
        const s = document.getElementById('surahNum').value;
        localStorage.setItem('quran_bookmark', s);
        document.getElementById('statusMsg').innerText = `Saved Surah ${s} ✨`;
    }

    async function loadSurah() {
        const s = document.getElementById('surahNum').value;
        const main = document.getElementById('mainContent');
        main.innerHTML = '<p style="text-align:center; color:var(--emerald)">Opening the Book...</p>';

        try {
            const [ar, en] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/en.sahih`)
            ]);
            const arD = await ar.json();
            const enD = await en.json();

            main.innerHTML = '';
            arD.data.ayahs.forEach((ayah, i) => {
                // To keep it simple and fast, we provide a placeholder meaning context
                const meaningContext = `This verse belongs to Surah ${arD.data.englishName}. It was revealed in ${arD.data.revelationType} to guide mankind towards righteousness.`;
                main.innerHTML += renderAyah(ayah, enD.data.ayahs[i], i, false, meaningContext);
            });
            lucide.createIcons();
        } catch(e) { main.innerHTML = "Error loading. Check connection."; }
    }

    async function loadRandom() {
        const main = document.getElementById('mainContent');
        const randomId = Math.floor(Math.random() * 6236) + 1;
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/ayah/${randomId}/en.sahih`);
            const data = await res.json();
            const arRes = await fetch(`https://api.alquran.cloud/v1/ayah/${randomId}`);
            const arData = await arRes.json();

            main.innerHTML = `<div style="text-align:center; margin-bottom: 20px; color:var(--gold)">-- Divine Reflection --</div>
                              ${renderAyah(arData.data, data.data, 999, true, "Reflect on this verse's purpose in your life today.")}`;
            lucide.createIcons();
        } catch(e) { console.error(e); }
    }

    function renderAyah(ar, en, i, isRandom, purpose = "") {
        return `
            <div class="ayah-card">
                <div class="arabic">${ar.text}</div>
                <div class="translation">${en.text}</div>
                <div class="card-footer">
                    <span class="ayah-info">${isRandom ? ar.surah.englishName : ''} Ayah ${ar.numberInSurah}</span>
                    <div style="display:flex; gap:15px;">
                        <button class="audio-mini" onclick="playA(${ar.number})"><i data-lucide="play-circle" size="16"></i> Listen</button>
                        <button class="audio-mini" onclick="toggleT(${i})"><i data-lucide="info" size="16"></i> Meaning</button>
                    </div>
                </div>
                <div id="taf-${i}" class="tafseer-panel"><strong>Purpose & Context:</strong><br>${purpose}</div>
            </div>
        `;
    }

    function toggleT(id) {
        const p = document.getElementById(`taf-${id}`);
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function playA(n) {
        new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${n}.mp3`).play();
    }
</script>

</body>
</html>
