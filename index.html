<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayah | Royal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #0f1014;
            --sidebar-bg: #1a1c23;
            --card-bg: #242731;
            --accent: #eab308; /* Rose Gold / Deep Yellow */
            --primary: #ec4899; /* Subtle Rose accent */
            --text: #ffffff;
            --sub-text: #a1a1aa;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Quicksand', sans-serif; margin: 0; 
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; height: 100vh; background: var(--sidebar-bg);
            border-right: 1px solid rgba(234, 179, 8, 0.1);
            position: fixed; display: flex; flex-direction: column;
            align-items: center; padding-top: 40px; z-index: 100;
        }

        .sidebar-logo { color: var(--accent); margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.3)); }
        .sidebar-brand { font-size: 2rem; font-weight: 700; color: var(--text); letter-spacing: 3px; margin-bottom: 40px; }

        .sidebar-info {
            padding: 20px; font-size: 0.85rem; color: var(--sub-text);
            line-height: 1.6; text-align: center; border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 20px;
        }

        /* --- MAIN CONTENT --- */
        .main-wrapper { margin-left: 260px; flex: 1; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 850px; margin: 0 auto; }

        header {
            text-align: center; padding: 50px 20px; background: var(--card-bg);
            border-radius: 30px; border: 1px solid rgba(234, 179, 8, 0.1);
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .accent-text { color: var(--accent); }

        /* --- NAVIGATION --- */
        .nav-bar { display: flex; gap: 12px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        
        /* Surah Dropdown Styling */
        select {
            background: var(--card-bg); border: 1px solid var(--accent);
            color: #fff; padding: 12px; border-radius: 12px; cursor: pointer;
            font-family: 'Quicksand'; font-weight: 600; outline: none;
        }

        .btn-action {
            background: var(--accent); color: #000; border: none;
            padding: 12px 24px; border-radius: 12px; cursor: pointer;
            font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-action:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* --- CARDS --- */
        .ayah-card {
            background: var(--card-bg); border-radius: 24px; padding: 35px;
            margin-bottom: 25px; border-left: 5px solid var(--accent);
            transition: 0.3s;
        }

        .arabic {
            font-family: 'Amiri', serif; font-size: 2.2rem; text-align: right;
            color: #fff; line-height: 2.5; margin-bottom: 20px; direction: rtl;
        }

        .translation { font-size: 1.1rem; color: var(--sub-text); line-height: 1.7; margin-bottom: 25px; font-weight: 400; }

        .tafseer-panel {
            background: rgba(234, 179, 8, 0.05); border-radius: 12px; padding: 20px;
            font-size: 0.95rem; color: #fff; border: 1px dashed var(--accent);
            display: none; margin-top: 20px;
        }

        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .ayah-info { font-size: 0.75rem; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .audio-mini { background: none; border: none; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 600; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-wrapper { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo"><i data-lucide="book-marked" size="52"></i></div>
    <div class="sidebar-brand">Ayah</div>
    
    <div class="sidebar-info">
        <strong style="color: var(--accent);">Significance of the Qur'an</strong><br>
        A guide for all humanity, a light in the darkness, and a mercy to those who believe.
    </div>
    
    <div class="sidebar-info" style="border:none; font-style: italic;">
        "Verily, in the remembrance of Allah do hearts find rest."
    </div>
</div>

<div class="main-wrapper">
    <div class="container">
        <header>
            <div style="margin-bottom: 15px;"><i data-lucide="crown" color="#eab308" size="40"></i></div>
            <h1>The Eternal <span class="accent-text">Messages</span></h1>
            <p id="statusMsg" style="color: var(--sub-text);">Select a Surah to begin your journey</p>
        </header>

        <div class="nav-bar">
            <select id="surahSelect">
                <option value="" disabled selected>Select Surah...</option>
            </select>
            
            <button class="btn-action" onclick="loadSurah()"><i data-lucide="book-open"></i> Read</button>
            <button class="btn-action btn-outline" onclick="loadRandom()"><i data-lucide="sparkles"></i> Random Ayah</button>
        </div>

        <div id="mainContent"></div>
    </div>
</div>

<script>
    lucide.createIcons();

    const surahSelect = document.getElementById('surahSelect');

    // Populate Surah List on Load
    async function init() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            data.data.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.number;
                opt.textContent = `${s.number}. ${s.englishName}`;
                surahSelect.appendChild(opt);
            });

            const last = localStorage.getItem('quran_bookmark');
            if(last) {
                surahSelect.value = last;
                loadSurah();
            }
        } catch (e) { console.error("Could not load Surah list"); }
    }
    init();

    async function loadSurah() {
        const s = surahSelect.value;
        if(!s) return;
        
        localStorage.setItem('quran_bookmark', s);
        const main = document.getElementById('mainContent');
        main.innerHTML = '<p style="text-align:center; color:var(--accent)">Unveiling the verses...</p>';

        try {
            const [ar, en] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/en.sahih`)
            ]);
            const arD = await ar.json();
            const enD = await en.json();

            main.innerHTML = '';
            arD.data.ayahs.forEach((ayah, i) => {
                const context = `This Ayah is part of ${arD.data.englishName} (${arD.data.englishNameTranslation}). Revealed in ${arD.data.revelationType}, it carries the profound weight of divine guidance.`;
                main.innerHTML += renderAyah(ayah, enD.data.ayahs[i], i, false, context);
            });
            lucide.createIcons();
        } catch(e) { main.innerHTML = "Error loading. Check connection."; }
    }

    async function loadRandom() {
        const main = document.getElementById('mainContent');
        const randomId = Math.floor(Math.random() * 6236) + 1;
        main.innerHTML = '<p style="text-align:center; color:var(--accent)">Seeking inspiration...</p>';
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/ayah/${randomId}/en.sahih`);
            const data = await res.json();
            const arRes = await fetch(`https://api.alquran.cloud/v1/ayah/${randomId}`);
            const arData = await arRes.json();

            main.innerHTML = `<div style="text-align:center; margin-bottom: 25px; color:var(--accent); font-weight:bold;">-- LIGHT FROM THE UNSEEN --</div>
                              ${renderAyah(arData.data, data.data, 999, true, "Reflect upon this message and its purpose in your heart today.")}`;
            lucide.createIcons();
        } catch(e) { console.error(e); }
    }

    function renderAyah(ar, en, i, isRandom, purpose = "") {
        return `
            <div class="ayah-card">
                <div class="arabic">${ar.text}</div>
                <div class="translation">${en.text}</div>
                <div class="card-footer">
                    <span class="ayah-info">${isRandom ? ar.surah.englishName : ''} Ayah ${ar.numberInSurah}</span>
                    <div style="display:flex; gap:15px;">
                        <button class="audio-mini" onclick="playA(${ar.number})"><i data-lucide="play-circle" size="18"></i> Listen</button>
                        <button class="audio-mini" onclick="toggleT(${i})"><i data-lucide="help-circle" size="18"></i> Purpose</button>
                    </div>
                </div>
                <div id="taf-${i}" class="tafseer-panel"><strong>Meaning & Context:</strong><br>${purpose}</div>
            </div>
        `;
    }

    function toggleT(id) {
        const p = document.getElementById(`taf-${id}`);
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function playA(n) {
        new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${n}.mp3`).play();
    }
</script>

</body>
</html>
