<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Quran | Emerald Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0f172a;
            --gold: #fbbf24; 
            --emerald: #10b981;   
            --text: #f8fafc;
            --sub-text: #94a3b8;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Quicksand', sans-serif; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at 2px 2px, rgba(16, 185, 129, 0.05) 1px, transparent 0);
            background-size: 30px 30px;
        }

        .container { max-width: 850px; margin: 0 auto; }

        header {
            text-align: center; padding: 40px 20px; background: rgba(15, 23, 42, 0.6);
            border-radius: 30px; border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 30px; backdrop-filter: blur(12px);
        }

        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        /* --- NAVIGATION --- */
        .nav-bar {
            display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap;
        }
        input {
            background: var(--card-bg); border: 1px solid rgba(16, 185, 129, 0.3);
            color: #fff; padding: 12px; border-radius: 12px; width: 80px; text-align: center;
        }
        .btn-action {
            background: var(--emerald); color: #05070a; border: none;
            padding: 12px 20px; border-radius: 12px; cursor: pointer;
            font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-gold { background: var(--gold); }
        .btn-outline { background: transparent; border: 1px solid var(--emerald); color: var(--emerald); }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* --- AYAH CARDS --- */
        .ayah-card {
            background: var(--card-bg); border-radius: 25px; padding: 30px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
            position: relative; animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .arabic {
            font-family: 'Amiri', serif; font-size: 2.1rem; text-align: right;
            color: #fff; line-height: 2.3; margin-bottom: 15px; direction: rtl;
        }

        .translation { font-size: 1.05rem; color: var(--sub-text); line-height: 1.6; margin-bottom: 20px; }

        .tafseer-panel {
            background: rgba(16, 185, 129, 0.05); border-radius: 15px; padding: 20px;
            font-size: 0.95rem; color: var(--emerald); border-left: 4px solid var(--emerald);
            display: none; margin-top: 15px; line-height: 1.5;
        }

        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); pt: 15px; }
        .ayah-info { font-size: 0.75rem; color: var(--gold); font-weight: 700; text-transform: uppercase; }

        .audio-mini { background: none; border: none; color: var(--emerald); cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="margin-bottom: 10px;"><i data-lucide="compass" color="#10b981" size="32"></i></div>
        <h1>The Radiant <span class="gold-text">Quran</span></h1>
        <p id="statusMsg" style="font-size: 0.85rem; color: var(--sub-text); margin-top: 8px;">Explore the Divine Wisdom</p>
    </header>

    <div class="nav-bar">
        <input type="number" id="surahNum" value="1" min="1" max="114">
        <button class="btn-action" onclick="loadSurah()"><i data-lucide="book-open"></i> Read</button>
        <button class="btn-action btn-gold" onclick="saveBookmark()"><i data-lucide="bookmark"></i></button>
        <button class="btn-action btn-outline" onclick="loadRandom()"><i data-lucide="sparkles"></i> Inspire Me</button>
    </div>

    <div id="mainContent"></div>
</div>

<script>
    lucide.createIcons();

    // Load last read Surah
    window.onload = () => {
        const last = localStorage.getItem('quran_bookmark');
        if(last) {
            document.getElementById('surahNum').value = last;
            document.getElementById('statusMsg').innerText = `Welcome back! Continuing Surah ${last}`;
            loadSurah();
        }
    };

    function saveBookmark() {
        const s = document.getElementById('surahNum').value;
        localStorage.setItem('quran_bookmark', s);
        document.getElementById('statusMsg').innerText = `Saved Surah ${s} to your bookmarks ✨`;
    }

    async function loadRandom() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<p style="text-align:center; color:var(--emerald)">✨ Seeking a blessed verse...</p>';
        
        try {
            // Get random Ayah (1 to 6236)
            const randomId = Math.floor(Math.random() * 6236) + 1;
            const res = await fetch(`https://api.alquran.cloud/v1/ayah/${randomId}/en.sahih`);
            const data = await res.json();
            
            // Get Arabic for the same Ayah
            const arRes = await fetch(`https://api.alquran.cloud/v1/ayah/${randomId}`);
            const arData = await arRes.json();

            main.innerHTML = `
                <div style="text-align:center; margin-bottom: 20px; color:var(--gold)">-- Random Inspiration --</div>
                ${renderAyah(arData.data, data.data, 0, true)}
            `;
            lucide.createIcons();
        } catch(e) { console.error(e); }
    }

    async function loadSurah() {
        const s = document.getElementById('surahNum').value;
        const main = document.getElementById('mainContent');
        main.innerHTML = '<p style="text-align:center; color:var(--emerald)">Loading Surah...</p>';

        try {
            const [ar, en, tf] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/en.sahih`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/en.jalalayn`)
            ]);
            const arD = await ar.json();
            const enD = await en.json();
            const tfD = await tf.json();

            main.innerHTML = '';
            arD.data.ayahs.forEach((ayah, i) => {
                main.innerHTML += renderAyah(ayah, enD.data.ayahs[i], i, false, tfD.data.ayahs[i].text);
            });
            lucide.createIcons();
        } catch(e) { main.innerHTML = "Error loading. Check connection."; }
    }

    function renderAyah(ar, en, i, isRandom, taf = "") {
        return `
            <div class="ayah-card">
                <div class="arabic">${ar.text}</div>
                <div class="translation">${en.text}</div>
                <div class="card-footer">
                    <span class="ayah-info">${isRandom ? ar.surah.englishName : ''} Ayah ${ar.numberInSurah}</span>
                    <div style="display:flex; gap:15px;">
                        <button class="audio-mini" onclick="playA(${ar.number})"><i data-lucide="play-circle" size="16"></i> Listen</button>
                        ${taf ? `<button class="audio-mini" onclick="toggleT(${i})"><i data-lucide="info" size="16"></i> Tafseer</button>` : ''}
                    </div>
                </div>
                <div id="taf-${i}" class="tafseer-panel"><strong>Explanation:</strong><br>${taf}</div>
            </div>
        `;
    }

    function toggleT(id) {
        const p = document.getElementById(`taf-${id}`);
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function playA(n) {
        new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${n}.mp3`).play();
    }
</script>

</body>
</html>
