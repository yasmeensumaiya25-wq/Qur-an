<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayah | Royal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Cinzel:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #0f1014;
            --sidebar-bg: #1a1c23;
            --card-bg: #242731;
            --accent: #eab308; 
            --text: #ffffff;
            --sub-text: #a1a1aa;
            --font-arabic: 'Scheherazade New', serif;
            --font-heading: 'Cinzel', serif;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Quicksand', sans-serif; margin: 0; 
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar-bg);
            border-right: 1px solid rgba(234, 179, 8, 0.2);
            position: fixed; display: flex; flex-direction: column;
            z-index: 100; overflow-y: auto;
        }

        .sidebar-header {
            padding: 40px 20px; text-align: center;
        }

        .sidebar-logo { color: var(--accent); filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.3)); }
        .sidebar-brand { 
            font-family: var(--font-heading); font-size: 2.2rem; 
            font-weight: 700; color: var(--text); letter-spacing: 4px; margin-top: 10px;
        }

        .sidebar-section { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .section-title { 
            font-family: var(--font-heading); color: var(--accent); 
            font-size: 0.9rem; margin-bottom: 15px; display: block; letter-spacing: 1px;
        }

        /* Bookmark List Styling */
        #bookmarkList { list-style: none; padding: 0; margin: 0; }
        .bookmark-item {
            padding: 10px 15px; background: rgba(255,255,255,0.03);
            border-radius: 8px; margin-bottom: 8px; cursor: pointer;
            font-size: 0.85rem; transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .bookmark-item:hover { background: rgba(234, 179, 8, 0.1); color: var(--accent); }

        /* --- MAIN CONTENT --- */
        .main-wrapper { margin-left: 280px; flex: 1; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 850px; margin: 0 auto; }

        header {
            text-align: center; padding: 50px 20px; background: var(--card-bg);
            border-radius: 30px; border: 1px solid rgba(234, 179, 8, 0.1);
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 { font-family: var(--font-heading); letter-spacing: 2px; }
        .accent-text { color: var(--accent); }

        /* --- NAVIGATION --- */
        .nav-bar { display: flex; gap: 12px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        
        select {
            background: var(--card-bg); border: 1px solid var(--accent);
            color: #fff; padding: 12px; border-radius: 12px; cursor: pointer;
            font-family: 'Quicksand'; font-weight: 600;
        }

        .btn-action {
            background: var(--accent); color: #000; border: none;
            padding: 12px 24px; border-radius: 12px; cursor: pointer;
            font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-action:hover { transform: scale(1.05); }

        /* --- CARDS --- */
        .ayah-card {
            background: var(--card-bg); border-radius: 24px; padding: 35px;
            margin-bottom: 25px; border-top: 1px solid rgba(234, 179, 8, 0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .arabic {
            font-family: var(--font-arabic); font-size: 2.8rem; text-align: right;
            color: #fff; line-height: 1.8; margin-bottom: 25px; direction: rtl;
        }

        .translation { font-size: 1.15rem; color: var(--sub-text); line-height: 1.8; margin-bottom: 25px; }

        .tafseer-panel {
            background: rgba(234, 179, 8, 0.05); border-radius: 12px; padding: 20px;
            font-size: 0.95rem; border: 1px dashed var(--accent); display: none; margin-top: 20px;
        }

        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .ayah-info { font-family: var(--font-heading); font-size: 0.75rem; color: var(--accent); }
        .audio-mini { background: none; border: none; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 600; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-wrapper { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo"><i data-lucide="book-marked" size="52"></i></div>
        <div class="sidebar-brand">Ayah</div>
    </div>
    
    <div class="sidebar-section">
        <span class="section-title"><i data-lucide="history" size="14"></i> Recently Read</span>
        <ul id="bookmarkList">
            <li class="bookmark-item" style="color:var(--sub-text); font-style:italic;">No history yet...</li>
        </ul>
    </div>

    <div class="sidebar-section">
        <span class="section-title">Significance</span>
        <p style="font-size: 0.8rem; color: var(--sub-text); line-height: 1.6;">
            The Qur'an is the ultimate guide, a healing for the hearts, and a light for those seeking the truth.
        </p>
    </div>
</div>

<div class="main-wrapper">
    <div class="container">
        <header>
            <div style="margin-bottom: 15px;"><i data-lucide="library" color="#eab308" size="40"></i></div>
            <h1>The Eternal <span class="accent-text">Messages</span></h1>
            <p id="statusMsg" style="color: var(--sub-text);">Choose a Surah to explore its wisdom</p>
        </header>

        <div class="nav-bar">
            <select id="surahSelect">
                <option value="" disabled selected>Select Surah...</option>
            </select>
            <button class="btn-action" onclick="loadSurah()"><i data-lucide="book-open"></i> Read</button>
            <button class="btn-action btn-outline" onclick="loadRandom()"><i data-lucide="sparkles"></i> Random</button>
        </div>

        <div id="mainContent"></div>
    </div>
</div>

<script>
    lucide.createIcons();

    const surahSelect = document.getElementById('surahSelect');
    const bookmarkList = document.getElementById('bookmarkList');

    async function init() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            data.data.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.number;
                opt.textContent = `${s.number}. ${s.englishName}`;
                surahSelect.appendChild(opt);
            });
            updateBookmarkUI();
        } catch (e) { console.error("Initialization failed"); }
    }
    init();

    async function loadSurah(sNum = null) {
        const s = sNum || surahSelect.value;
        if(!s) return;
        
        surahSelect.value = s;
        saveToHistory(s);
        
        const main = document.getElementById('mainContent');
        main.innerHTML = '<p style="text-align:center; color:var(--accent); font-family:var(--font-heading);">Unveiling the Divine Word...</p>';

        try {
            const [ar, en] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/en.sahih`)
            ]);
            const arD = await ar.json();
            const enD = await en.json();

            main.innerHTML = '';
            arD.data.ayahs.forEach((ayah, i) => {
                const context = `Surah ${arD.data.englishName} (${arD.data.revelationType}). A profound message of ${arD.data.englishNameTranslation}.`;
                main.innerHTML += renderAyah(ayah, enD.data.ayahs[i], i, false, context);
            });
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch(e) { main.innerHTML = "Connection error. Please try again."; }
    }

    function saveToHistory(sNum) {
        let history = JSON.parse(localStorage.getItem('ayah_history')) || [];
        if(!history.includes(sNum)) {
            history.unshift(sNum);
            if(history.length > 5) history.pop(); // Keep last 5
            localStorage.setItem('ayah_history', JSON.stringify(history));
            updateBookmarkUI();
        }
    }

    function updateBookmarkUI() {
        const history = JSON.parse(localStorage.getItem('ayah_history')) || [];
        if(history.length === 0) return;
        
        bookmarkList.innerHTML = '';
        history.forEach(num => {
            const li = document.createElement('li');
            li.className = 'bookmark-item';
            li.innerHTML = `<i data-lucide="bookmark" size="14"></i> Surah ${num}`;
            li.onclick = () => loadSurah(num);
            bookmarkList.appendChild(li);
        });
        lucide.createIcons();
    }

    async function loadRandom() {
        const main = document.getElementById('mainContent');
        const randomId = Math.floor(Math.random() * 6236) + 1;
        main.innerHTML = '<p style="text-align:center; color:var(--accent)">Seeking a blessed verse...</p>';
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/ayah/${randomId}/en.sahih`);
            const data = await res.json();
            const arRes = await fetch(`https://api.alquran.cloud/v1/ayah/${randomId}`);
            const arData = await arRes.json();

            main.innerHTML = `<div style="text-align:center; margin-bottom: 25px; color:var(--accent); font-family:var(--font-heading);">-- Divine Reflection --</div>
                              ${renderAyah(arData.data, data.data, 999, true, "Reflect upon this revelation.")}`;
            lucide.createIcons();
        } catch(e) { console.error(e); }
    }

    function renderAyah(ar, en, i, isRandom, purpose = "") {
        return `
            <div class="ayah-card">
                <div class="arabic">${ar.text}</div>
                <div class="translation">${en.text}</div>
                <div class="card-footer">
                    <span class="ayah-info">${isRandom ? ar.surah.englishName : ''} Ayah ${ar.numberInSurah}</span>
                    <div style="display:flex; gap:15px;">
                        <button class="audio-mini" onclick="playA(${ar.number})"><i data-lucide="play-circle" size="18"></i> Listen</button>
                        <button class="audio-mini" onclick="toggleT(${i})"><i data-lucide="info" size="18"></i> Purpose</button>
                    </div>
                </div>
                <div id="taf-${i}" class="tafseer-panel"><strong>Context:</strong><br>${purpose}</div>
            </div>
        `;
    }

    function toggleT(id) {
        const p = document.getElementById(`taf-${id}`);
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function playA(n) {
        new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${n}.mp3`).play();
    }
</script>

</body>
</html>
