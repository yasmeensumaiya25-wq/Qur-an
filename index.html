<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #064e3b;
            --accent-gold: #fbbf24;
            --text-light: #f3f4f6;
            --hover-green: #065f46;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafb;
        }

        /* Sidebar Container */
        .sidebar {
            height: 100vh;
            width: 260px;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--primary-green);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 4px 0px 10px rgba(0,0,0,0.1);
        }

        /* Logo & Brand Section */
        .brand-section {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(251, 191, 36, 0.3);
            margin-bottom: 20px;
        }

        .brand-logo {
            font-size: 2.2rem;
            color: var(--accent-gold);
            filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.5));
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-light);
        }

        /* Navigation Links */
        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            margin: 8px 0;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background-color: var(--hover-green);
            color: var(--accent-gold);
            transform: translateX(5px);
        }

        .nav-link i {
            width: 20px;
            text-align: center;
        }

        /* Bottom Profile/Settings */
        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(251, 191, 36, 0.3);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-section">
            <i class="fa-solid fa-book-quran brand-logo"></i>
            <span class="brand-name">Ayah</span>
        </div>

        <ul class="nav-links">
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="fa-solid fa-mosque"></i> Surahs</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="fa-solid fa-bookmark"></i> Bookmarks</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="fa-solid fa-headphones"></i> Audio</a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a href="#" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </div>

</body>
</html>
